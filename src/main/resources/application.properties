# ============================================
# Finance Backend - Application Configuration
# ============================================

spring.application.name=finance-backend
server.port=8080

# --- H2 Database (file-based for persistence across restarts) ---
spring.datasource.url=jdbc:h2:file:./data/financedb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console (useful for debugging) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT Configuration ---
app.jwt.secret=finance-app-super-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# --- Logging ---
logging.level.com.financeapp=DEBUG
logging.level.org.springframework.security=WARN

# --- Springdoc / Swagger UI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.path=/v3/api-docs
server.port=${PORT:8080}
